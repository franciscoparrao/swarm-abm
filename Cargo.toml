[workspace]
resolver = "3"
members = [
    "crates/swarm-core",
    "examples/boids",
    "examples/difusion",
    "examples/network-sir",
    "examples/schelling",
    "examples/sir",
    "models/debris-flow",
]

[workspace.package]
version = "0.3.0"
edition = "2024"
license = "MIT OR Apache-2.0"
repository = "https://github.com/franciscoparrao/swarm-abm"

[workspace.dependencies]
swarm-core = { path = "crates/swarm-core" }
rand = "0.9"
rand_chacha = "0.9"
criterion = "0.5"
serde_json = "1"
rayon = "1"

[profile.release]
lto = true
codegen-units = 1
