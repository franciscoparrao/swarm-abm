name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: -D warnings

jobs:
  check:
    name: fmt · clippy · test · doc
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Cache cargo build
        uses: Swatinem/rust-cache@v2

      - name: Format check
        run: cargo fmt --all --check

      - name: Clippy
        run: cargo clippy --workspace --all-targets -- -D warnings

      - name: Clippy (sin features por defecto, camino WASM/secuencial)
        run: cargo clippy -p swarm-core --no-default-features --all-targets -- -D warnings

      - name: Tests
        run: cargo test --workspace

      - name: Tests (sin features por defecto)
        run: cargo test -p swarm-core --no-default-features

      - name: Docs (los warnings de rustdoc fallan el build)
        env:
          RUSTDOCFLAGS: -D warnings
        run: cargo doc --workspace --no-deps
