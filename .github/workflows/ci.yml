name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: -D warnings

jobs:
  check:
    name: fmt · clippy · test · doc
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Cache cargo build
        uses: Swatinem/rust-cache@v2

      - name: Format check
        run: cargo fmt --all --check

      - name: Clippy
        run: cargo clippy --workspace --all-targets -- -D warnings

      - name: Clippy (sin features por defecto, camino WASM/secuencial)
        run: cargo clippy -p swarm-abm --no-default-features --all-targets -- -D warnings

      - name: Clippy (todas las features)
        run: cargo clippy --workspace --all-targets --all-features -- -D warnings

      - name: Tests
        run: cargo test --workspace

      - name: Tests (sin features por defecto)
        run: cargo test -p swarm-abm --no-default-features

      # Covers the sequential arm of `evaluate_all` (experiment without
      # rayon), the declared WASM path, which no other job compiles.
      - name: Tests (experiment+serde sin parallel)
        run: cargo test -p swarm-abm --no-default-features --features experiment,serde

      - name: Docs (los warnings de rustdoc fallan el build)
        env:
          RUSTDOCFLAGS: -D warnings
        run: cargo doc --workspace --no-deps

  golden-values-wasm32:
    name: valores dorados en wasm32 (identidad cross-platform del wedge)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain (+ wasm32-wasip1)
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-wasip1

      - name: Cache cargo build
        uses: Swatinem/rust-cache@v2

      - name: Install wasmtime
        run: |
          curl -sSf https://wasmtime.dev/install.sh | bash -s -- --version v27.0.0
          echo "$HOME/.wasmtime/bin" >> "$GITHUB_PATH"

      - name: Golden values on wasm32-wasip1 (via wasmtime)
        env:
          CARGO_TARGET_WASM32_WASIP1_RUNNER: wasmtime
        run: |
          cargo test --target wasm32-wasip1 -p swarm-abm --no-default-features --test golden_values
          cargo test --target wasm32-wasip1 -p swarm-abm --no-default-features --test determinism

  bindings:
    name: bindings (swarm-py · swarm-wasm)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain (+ wasm32-unknown-unknown)
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown

      # Both crates are excluded from the workspace (each has its own
      # lockfile), so cargo runs from each crate's directory and the cache
      # tracks both trees.
      - name: Cache cargo build
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: |
            crates/swarm-py
            crates/swarm-wasm

      - name: Check swarm-py (compila sin libpython)
        working-directory: crates/swarm-py
        run: cargo check

      - name: Check swarm-wasm (target wasm32-unknown-unknown)
        working-directory: crates/swarm-wasm
        run: cargo check --target wasm32-unknown-unknown

  msrv:
    name: MSRV (1.87 — swarm-abm / swarm-abm-derive)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # Pinned, not `stable`: this job's entire point is catching a change
      # that raises the *real* minimum, not just checking today's stable.
      - name: Install Rust 1.87.0
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: "1.87.0"

      - name: Cache cargo build
        uses: Swatinem/rust-cache@v2

      - name: cargo test at MSRV (all features)
        run: cargo test -p swarm-abm -p swarm-abm-derive --all-features
